<!DOCTYPE html>
<html>
<head>
  <title>Alphabet Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* 🔥 MOBILE BG */
    @media (max-width: 899px) {
      body {
        background-image: url('https://images.unsplash.com/photo-1635070041078-e363dbe005cb');
        background-size: cover;
        background-position: center;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(2,6,23,0.6);
        z-index: -1;
      }
    }

    /* 🔥 LAYOUT */
    .main {
      display: flex;
      min-height: 100vh;
    }

    .side {
      flex: 1;
      background: url('https://images.unsplash.com/photo-1635070041078-e363dbe005cb');
      background-size: cover;
      background-position: center;
      display: none;
    }

    .content {
      flex: 1;
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      background: linear-gradient(to right, gold, orange);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 15px;
    }

    /* 🔥 GOLDEN GLOW BOX */
    .box {
      background: rgba(17, 24, 39, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;

      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow:
        0 0 20px rgba(255, 215, 0, 0.4),   /* outer glow */
        0 0 30px rgba(255, 215, 0, 0.25),  /* spread glow */
        0 10px 40px rgba(0,0,0,0.5);
    }

    select, input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 8px;
      background: rgba(2,6,23,0.8);
      color: white;
      text-align: center;
      outline: none;
    }

    /* 🔥 INPUT GLOW ON FOCUS */
    input:focus {
      box-shadow: 0 0 20px gold;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      background: linear-gradient(to right, gold, orange);
      color: black;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      box-shadow: 0 0 10px gold;
      transform: scale(1.03);
    }

    #backBtn {
      background: #1e293b;
      color: white;
    }

    .letters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(42px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .letter-card {
      background: rgba(2,6,23,0.7);
      border-radius: 10px;
      padding: 8px 0;
      text-align: center;

      border: 1px solid rgba(255,215,0,0.15);
      box-shadow: 0 0 40px rgba(255, 217, 0, 0.1);
    }

    .letter-card input {
      accent-color: gold;
    }

    #quizBox {
      display: none;
      text-align: center;
    }

    .result-box {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .correct {
      background: rgba(34,197,94,0.25);
      border: 1px solid #22c55e;
      box-shadow: 0 0 8px #22c55e;
    }

    .wrong {
      background: rgba(239,68,68,0.25);
      border: 1px solid #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    /* DESKTOP */
    @media (min-width: 900px) {
      .side {
        display: block;
      }

      body {
        background: #020617;
      }
    }
  </style>
</head>

<body>

<div class="main">

  <div class="side"></div>

  <div class="content">

    <h1>🔥 Alphabet Trainer</h1>

    <div class="box" id="startBox">

      <p>Mode</p>
      <select id="modeSelect">
        <option value="encode">Encode</option>
        <option value="decode">Decode</option>
        <option value="mixed">Mixed</option>
      </select>

      <p style="margin-top:10px;">Letters</p>

      <label>
        <input type="checkbox" id="selectAll" checked onchange="toggleAll()"> Select All
      </label>

      <div class="letters" id="letterContainer"></div>

      <button onclick="startQuiz()">Start Practice</button>
    </div>

    <div class="box" id="quizBox">

      <button id="backBtn" onclick="goBack()">⬅ Back</button>

      <h2 id="question"></h2>

      <input type="text" id="answer">

      <button id="actionBtn" onclick="handleAction()">Submit</button>

      <div id="resultBox" class="result-box"></div>

      <p>Score: <span id="score">0</span></p>
    </div>

  </div>

</div>

<script>
let score = 0, correctAnswer = "", mode = "mixed", letters = [], answered = false;

let container = document.getElementById("letterContainer");
for (let i = 65; i <= 90; i++) {
  let l = String.fromCharCode(i);
  container.innerHTML += `
    <div class="letter-card">
      <input type="checkbox" class="letterBox" value="${l}" checked>
      <div>${l}</div>
    </div>`;
}

function toggleAll() {
  let c = document.getElementById("selectAll").checked;
  document.querySelectorAll(".letterBox").forEach(cb => cb.checked = c);
}

function startQuiz() {
  mode = modeSelect.value;
  letters = [...document.querySelectorAll(".letterBox:checked")].map(cb => cb.value);
  if (!letters.length) return alert("Select letters!");

  startBox.style.display = "none";
  quizBox.style.display = "block";
  newQuestion();
}

function goBack() {
  quizBox.style.display = "none";
  startBox.style.display = "block";
}

function getPos(l){ return l.charCodeAt(0)-64 }

function newQuestion() {
  answered = false;
  answer.disabled = false;
  resultBox.style.display = "none";

  let l = letters[Math.floor(Math.random()*letters.length)];
  let m = mode==="mixed" ? (Math.random()>0.5?"encode":"decode") : mode;

  if(m==="encode"){
    correctAnswer = getPos(l);
    question.innerText = l+" = ?";
  } else {
    correctAnswer = l;
    question.innerText = getPos(l)+" = ?";
  }

  answer.value="";
  actionBtn.innerText="Submit";
}

function handleAction(){
  if(!answered) checkAnswer();
  else newQuestion();
}

function checkAnswer(){
  let u = answer.value.toUpperCase();

  if(u==correctAnswer){
    score++;
    resultBox.className="result-box correct";
    resultBox.innerText="✅ Correct!";
  } else {
    resultBox.className="result-box wrong";
    resultBox.innerText="❌ Correct: "+correctAnswer;
  }

  resultBox.style.display="block";
  scoreEl.innerText=score;
  answer.disabled=true;
  actionBtn.innerText="Next";
  answered=true;
}

let answer = document.getElementById("answer");
let question = document.getElementById("question");
let resultBox = document.getElementById("resultBox");
let actionBtn = document.getElementById("actionBtn");
let scoreEl = document.getElementById("score");

document.addEventListener("keydown", e=>{
  if(e.key==="Enter") handleAction();
});
</script>

</body>
</html>
