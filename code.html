<!DOCTYPE html>
<html>
<head>
  <title>Alphabet Trainer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      color: white;
      overflow-x: hidden;

      background: 
        linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.9)),
        url('https://images.unsplash.com/photo-1518770660439-4636190af475');

      background-size: cover;
      background-position: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      background: linear-gradient(to right, orange, yellow);
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 20px;
    }

    .box {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      margin-bottom: 20px;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      background: #020617;
      color: white;
      font-size: 16px;
      text-align: center;
    }

    input:disabled {
      opacity: 0.6;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      background: linear-gradient(to right, orange, gold);
      color: black;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    #backBtn {
      background: #1e293b;
      color: white;
      margin-bottom: 10px;
    }

    .letters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(50px, 1fr));
      gap: 10px;
      margin-top: 15px;
    }

    .letter-card {
      background: #020617;
      border-radius: 12px;
      padding: 10px 0;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s;
    }

    .letter-card:hover {
      border-color: gold;
      transform: scale(1.05);
    }

    .letter-card input {
      accent-color: gold;
      transform: scale(1.2);
      margin-bottom: 5px;
    }

    .letter-card span {
      display: block;
      font-size: 14px;
    }

    #quizBox {
      display: none;
      text-align: center;
    }

    #question {
      font-size: 28px;
      margin-bottom: 15px;
    }

    /* 🔥 RESULT BOX */
    .result-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 16px;
      display: none;
    }

    .correct {
      background: rgba(34,197,94,0.2);
      border: 1px solid #22c55e;
      color: #22c55e;
    }

    .wrong {
      background: rgba(239,68,68,0.2);
      border: 1px solid #ef4444;
      color: #ef4444;
    }

    .score {
      margin-top: 12px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔥 Alphabet Trainer</h1>

  <!-- START -->
  <div class="box" id="startBox">
    <p>Mode</p>
    <select id="modeSelect">
      <option value="encode">Encode (A → 1)</option>
      <option value="decode">Decode (1 → A)</option>
      <option value="mixed">Mixed</option>
    </select>

    <p style="margin-top:10px;">Letters</p>

    <label>
      <input type="checkbox" id="selectAll" checked onchange="toggleAll()"> Select All
    </label>

    <div class="letters" id="letterContainer"></div>

    <button onclick="startQuiz()">Start Practice</button>
  </div>

  <!-- QUIZ -->
  <div class="box" id="quizBox">

    <button id="backBtn" onclick="goBack()">⬅ Back</button>

    <h2 id="question">Q</h2>

    <input type="text" id="answer">

    <button id="actionBtn" onclick="handleAction()">Submit</button>

    <!-- RESULT UI -->
    <div id="resultBox" class="result-box"></div>

    <p class="score">Score: <span id="score">0</span></p>
  </div>

</div>

<script>
let score = 0;
let correctAnswer = "";
let mode = "mixed";
let letters = [];
let answered = false;

// generate letters
let container = document.getElementById("letterContainer");
for (let i = 65; i <= 90; i++) {
  let letter = String.fromCharCode(i);

  let div = document.createElement("div");
  div.className = "letter-card";

  div.innerHTML = `
    <input type="checkbox" class="letterBox" value="${letter}" checked>
    <span>${letter}</span>
  `;

  container.appendChild(div);
}

function toggleAll() {
  let checked = document.getElementById("selectAll").checked;
  document.querySelectorAll(".letterBox").forEach(cb => cb.checked = checked);
}

function startQuiz() {
  mode = document.getElementById("modeSelect").value;

  letters = [];
  document.querySelectorAll(".letterBox:checked").forEach(cb => {
    letters.push(cb.value);
  });

  if (letters.length === 0) {
    alert("Select at least one letter!");
    return;
  }

  document.getElementById("startBox").style.display = "none";
  document.getElementById("quizBox").style.display = "block";

  newQuestion();
}

function goBack() {
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("startBox").style.display = "block";
}

function getLetterPosition(letter) {
  return letter.charCodeAt(0) - 64;
}

function getLetter(num) {
  return String.fromCharCode(64 + num);
}

function newQuestion() {
  answered = false;

  document.getElementById("answer").disabled = false;
  document.getElementById("resultBox").style.display = "none";

  let selectedLetter = letters[Math.floor(Math.random() * letters.length)];
  let selectedMode = mode;

  if (mode === "mixed") {
    selectedMode = Math.random() > 0.5 ? "encode" : "decode";
  }

  if (selectedMode === "encode") {
    correctAnswer = getLetterPosition(selectedLetter);
    document.getElementById("question").innerText = selectedLetter + " = ?";
  } else {
    let num = getLetterPosition(selectedLetter);
    correctAnswer = selectedLetter;
    document.getElementById("question").innerText = num + " = ?";
  }

  document.getElementById("answer").value = "";
  document.getElementById("actionBtn").innerText = "Submit";
  document.getElementById("answer").focus();
}

function handleAction() {
  if (!answered) {
    checkAnswer();
  } else {
    newQuestion();
  }
}

function checkAnswer() {
  let user = document.getElementById("answer").value.toUpperCase();
  let box = document.getElementById("resultBox");

  if (user == correctAnswer) {
    score++;
    box.className = "result-box correct";
    box.innerText = "✅ Correct!";
  } else {
    box.className = "result-box wrong";
    box.innerText = "❌ Wrong! Correct: " + correctAnswer;
  }

  box.style.display = "block";
  document.getElementById("score").innerText = score;

  document.getElementById("answer").disabled = true;
  document.getElementById("actionBtn").innerText = "Next";

  answered = true;
}

// enter key
document.addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    handleAction();
  }
});
</script>

</body>
</html>
